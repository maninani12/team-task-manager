<!DOCTYPE html>
<html>

<head>

    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body style="background: #f4f7fc;">

<nav class="navbar navbar-dark bg-dark">

    <div class="container-fluid">

        <span class="navbar-brand">
            Team Task Manager
        </span>

        <a href="/logout" class="btn btn-danger">
            Logout
        </a>

    </div>

</nav>

<div class="container mt-5">

    <h1 class="text-center mb-5">Dashboard</h1>

    <div class="row">

        <div class="col-md-4">

            <div class="card shadow text-center p-4">

                <h3>Total Tasks</h3>

                <h2>{{ total }}</h2>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card shadow text-center p-4">

                <h3>Completed</h3>

                <h2>{{ completed }}</h2>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card shadow text-center p-4">

                <h3>Pending</h3>

                <h2>{{ pending }}</h2>

            </div>

        </div>

    </div>

    <div class="text-center mt-5">

        <a href="/create_project" class="btn btn-primary m-2">
            Create Project
        </a>

        <a href="/create_task" class="btn btn-success m-2">
            Create Task
        </a>

        <a href="/tasks" class="btn btn-dark m-2">
            View Tasks
        </a>

    </div>

</div>

</body>
</html>
