<!DOCTYPE html>
<html>

<head>

<title>Admin Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body style="background: linear-gradient(to right, #1d2b64, #f8cdda);">

<nav class="navbar navbar-dark bg-dark">

<div class="container-fluid">

<span class="navbar-brand">
Admin Dashboard
</span>

<a href="/logout" class="btn btn-danger">
Logout
</a>

</div>

</nav>

<div class="container mt-5">

<div class="row">

<div class="col-md-4">

<div class="card shadow p-4 text-center">

<h3>Total Tasks</h3>

<h1>{{ total }}</h1>

</div>

</div>

<div class="col-md-4">

<div class="card shadow p-4 text-center">

<h3>Completed</h3>

<h1>{{ completed }}</h1>

</div>

</div>

<div class="col-md-4">

<div class="card shadow p-4 text-center">

<h3>Pending</h3>

<h1>{{ pending }}</h1>

</div>

</div>

</div>

<div class="text-center mt-5">

<a href="/create_project" class="btn btn-primary m-2">
Create Project
</a>

<a href="/create_task" class="btn btn-success m-2">
Assign Task
</a>

<a href="/tasks" class="btn btn-dark m-2">
Manage Tasks
</a>

</div>

</div>

</body>
</html>
