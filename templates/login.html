<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background: linear-gradient(to right, #4facfe, #00f2fe);">

<div class="container">

<div class="row justify-content-center align-items-center vh-100">

<div class="col-md-4">

<div class="card shadow-lg p-4">

<h2 class="text-center mb-4">Login</h2>

<form method="POST">

<input type="email" name="email" class="form-control mb-3" placeholder="Enter Email" required>

<input type="password" name="password" class="form-control mb-3" placeholder="Enter Password" required>

<button type="submit" class="btn btn-primary w-100">Login</button>

</form>

<div class="text-center mt-3">

<a href="/signup">Create New Account</a>

</div>

</div>

</div>

</div>

</div>

</body>
</html>
