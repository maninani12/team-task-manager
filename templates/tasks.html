<!DOCTYPE html>
<html>

<head>

    <title>Tasks</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <h1 class="text-center mb-5">All Tasks</h1>

    <div class="card shadow p-4">

        <table class="table table-bordered table-hover">

            <thead class="table-dark">

                <tr>

                    <th>Task Title</th>
                    <th>Assigned To</th>
                    <th>Status</th>

                </tr>

            </thead>

            <tbody>

                {% for task in tasks %}

                <tr>

                    <td>{{ task.title }}</td>
                    <td>{{ task.assigned_to }}</td>
                    <td>{{ task.status }}</td>

                </tr>

                {% endfor %}

            </tbody>

        </table>

    </div>

</div>

</body>
</html>
