<!DOCTYPE html>
<html>

<head>

<title>Manage Tasks</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body style="background: #eef2f3;">

<nav class="navbar navbar-dark bg-dark">

<div class="container-fluid">

<a href="/admin_dashboard"
class="btn btn-light">
Back
</a>

<div>

<a href="/logout"
class="btn btn-danger">
Logout
</a>

</div>

</div>

</nav>

<div class="container mt-5">

<h1 class="text-center mb-5">
Manage Tasks
</h1>

<div class="card shadow-lg p-4">

<table class="table table-bordered table-hover">

<thead class="table-dark">

<tr>

<th>Task</th>

<th>Description</th>

<th>Assigned To</th>

<th>Priority</th>

<th>Start Date</th>

<th>Due Date</th>

<th>Status</th>

<th>Admin Review</th>

<th>Task Control</th>

</tr>

</thead>

<tbody>

{% for task in tasks %}

<tr>

<form method="POST"
action="/admin_update_task/{{ task.id }}">

<td>

<input type="text"
name="title"
class="form-control"
value="{{ task.title }}">

</td>

<td>

<input type="text"
name="description"
class="form-control"
value="{{ task.description }}">

</td>

<td>

<input type="text"
name="assigned_to"
class="form-control"
value="{{ task.assigned_to }}">

</td>

<td>

<select name="priority"
class="form-control">

<option>{{ task.priority }}</option>

<option>High</option>

<option>Medium</option>

<option>Low</option>

</select>

</td>

<td>

<input type="date"
name="start_date"
class="form-control"
value="{{ task.start_date }}">

</td>

<td>

<input type="date"
name="due_date"
class="form-control"
value="{{ task.due_date }}">

</td>

<td>

<span class="badge bg-primary">
{{ task.status }}
</span>

</td>

<td>

<input type="text"
name="admin_review"
class="form-control"
value="{{ task.admin_review }}">

</td>

<td>

<button type="submit"
class="btn btn-primary btn-sm mb-2">
Update
</button>

<br>

{% if task.task_active == 'Yes' %}

<a href="/toggle_task/{{ task.id }}"
class="btn btn-warning btn-sm mb-2">
Lock
</a>

{% else %}

<a href="/toggle_task/{{ task.id }}"
class="btn btn-success btn-sm mb-2">
Unlock
</a>

{% endif %}

<br>

<a href="/delete_task/{{ task.id }}"
class="btn btn-danger btn-sm">
Delete
</a>

</td>

</form>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</div>

</body>

</html>
