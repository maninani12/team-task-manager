<!DOCTYPE html>
<html>

<head>
    <title>Tasks</title>
</head>

<body>

<h1>All Tasks</h1>

<table border="1" cellpadding="10">

<tr>
    <th>Task Title</th>
    <th>Assigned To</th>
    <th>Status</th>
</tr>

{% for task in tasks %}
<tr>
    <td>{{ task.title }}</td>
    <td>{{ task.assigned_to }}</td>
    <td>{{ task.status }}</td>
</tr>
{% endfor %}

</table>

</body>
</html>
